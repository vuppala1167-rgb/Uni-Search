<!DOCTYPE html>
<html>
<head>
<title>UniSearch & Plan</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>UniSearch & Plan</h1>
<p>Find universities based on your study preferences</p>

<form id="searchForm">

<label for="course">Course</label>
<input type="text" id="course" placeholder="Computer Science">

<label for="region">Region</label>
<input type="text" id="region" placeholder="Australia">

<label for="intake">Intake</label>
<input type="text" id="intake" placeholder="July">

<button type="submit">Search</button>

</form>

<div id="results"></div>

<script src="script.js"></script>

</body>
</html>
